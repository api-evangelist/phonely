specification: API Evangelist Vocabulary
specificationVersion: '0.1'
provider: Phonely
providerId: phonely
created: '2026-05-24'
modified: '2026-05-24'
description: Vocabulary and taxonomy for the Phonely AI voice agent platform — capability dimensions, operational concepts, and domain terms used across the agents API, the post-call webhook, and the workflow builder.

dimensions:
  industries:
    - Healthcare
    - Insurance
    - Real Estate
    - Legal
    - Finance
    - Home Services
    - Contact Center
    - SMB
  channels:
    - Voice
    - SMS
    - API Integration
  callDirection:
    - inbound
    - outbound
  conversationStyles:
    - Casual
    - Humorous
    - Direct
    - Formal
    - Persuasive
    - Friendly
  sentiments:
    - positive
    - neutral
    - negative
    - mixed
  endedReasons:
    - caller_hangup
    - agent_hangup
    - transfer
    - voicemail
    - error

entities:
  Agent:
    description: A configured Phonely AI voice agent — owns a phone number, a voice, a greeting, a conversation style, and an attached workflow.
    keyFields:
      - uid
      - agentId
      - name
      - businessPhoneNumber
      - voiceId
      - conversationStyle
  Call:
    description: A single inbound or outbound interaction handled by an agent.
    keyFields:
      - callId
      - callDirection
      - callStarted
      - callEnded
      - duration
      - sentiment
      - summary
  Workflow:
    description: The visual conversation graph that defines what an agent does on a call (greetings, branching, API calls, transfers, post-call actions).
    notes: Workflows can include an "API Request" block that calls any REST API imported from a cURL command.
  PostCallEvent:
    description: The structured JSON payload Phonely POSTs to a customer-configured HTTPS endpoint after each call.
    keyFields:
      - callId
      - transcript
      - summary
      - sentiment
      - actionItems
      - recordingUrl
  PhoneNumber:
    description: A business phone number assigned to an agent in E.164 format.
  Voice:
    description: A synthesized voice identity from Phonely's 1,000+ voice library across 100+ languages.

capabilities:
  - name: Real-Time Voice Answering
    description: Answer business phone calls with sub-400ms response latency.
  - name: Voice Selection and Cloning
    description: Choose from 1,000+ voices across 100+ languages; clone custom voices on Enterprise.
  - name: Conversation Style Tuning
    description: Per-agent conversation style (Casual / Humorous / Direct / Formal / Persuasive / Friendly) and humanization toggle.
  - name: Workflow Authoring
    description: Visual builder for branching call flows with API Request blocks for arbitrary REST integrations.
  - name: Outbound Campaigns
    description: Programmatic outbound calling for lead capture, qualification, and follow-up.
  - name: CRM and Calendar Integration
    description: Prebuilt one-click integrations with Salesforce, HubSpot, Five9, Google Calendar, Outlook, Gmail, Slack, Zapier.
  - name: SIP Trunking
    description: Enterprise SIP trunking and number provisioning.
  - name: Post-Call Webhook Delivery
    description: Send structured call data (transcript, summary, sentiment, action items, recording) to any HTTPS endpoint after a call.
  - name: AI Analytics
    description: Per-call AI-generated summary, sentiment, key points, action items, unanswered questions, follow-up indicators.
  - name: A/B Testing
    description: Compare agent configurations across calls (Pro plan and above).
  - name: Spam Filtering
    description: Block known spam callers from reaching the agent.
  - name: Fine-Tuned Industry Models
    description: Pre-trained models for healthcare, finance, real estate, insurance, and home services on Enterprise.

compliance:
  - SOC 2
  - HIPAA (with BAA on Enterprise)
  - GDPR
  - CCPA
  - PCI

operationalTerms:
  uid: User identifier — the Phonely account owner.
  agentId: Stable identifier of a configured voice agent.
  orgId: Optional organization identifier for multi-team accounts.
  callId: Unique identifier for a single call.
  transcript: Structured array of speaker turns ({role, content}) generated by Phonely's ASR.
  transcriptText: Flat-text rendering of the transcript.
  humanizeConversation: Boolean toggle enabling natural pacing, filler words, and disfluencies.
  ai_success: Phonely-internal indicator of whether the AI handled the call to spec.
