description: 'Reconciled plans and per-minute pricing for the Phonely AI voice agent platform. Source: phonely.ai/pricing and Phonely developer documentation. Phonely uses a usage-based model — minutes-included plus per-minute overage rather than per-agent seats.'
sources:
  - https://www.phonely.ai/pricing
  - https://www.phonely.ai/developer
  - https://docs.phonely.ai
plans:
