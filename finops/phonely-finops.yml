    unit: month
    aggregation: max
    dimensions:
      - plan
      - billing_cycle
  - name: included_minutes
    unit: minute
    aggregation: sum
    dimensions:
      - plan
      - agent_id
  - name: overage_minutes
    unit: minute
    aggregation: sum
    dimensions:
      - plan
      - agent_id
      - call_direction
  - name: post_transfer_minutes
    unit: minute
